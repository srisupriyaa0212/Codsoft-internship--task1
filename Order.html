<!DOCTYPE html>
<html>
<head>
<title>Place Order - GlowNest Beauty</title>
</head>

<body style="font-family:Arial;background:#f5f5f5;">

<div style="max-width:500px;margin:40px auto;background:white;padding:25px;border-radius:10px;box-shadow:0 0 10px gray;">

<h1 style="text-align:center;color:#ff4d94;">Place Your Order</h1>

<form>

<label>Full Name</label><br><br>
<input type="text" style="width:100%;padding:10px;" required><br><br>

<label>Mobile Number</label><br><br>
<input type="tel" style="width:100%;padding:10px;" required><br><br>

<label>Delivery Address</label><br><br>
<textarea rows="4" style="width:100%;padding:10px;" required></textarea><br><br>

<label>Product</label><br><br>
<input type="text" id="product" style="width:100%;padding:10px;" readonly><br><br>

<label>Price</label><br><br>
<input type="text" id="price" style="width:100%;padding:10px;" readonly><br><br>

<label>Quantity</label><br><br>
<input type="number" min="1" value="1" style="width:100%;padding:10px;"><br><br>

<label>Payment Method</label><br><br>
<select style="width:100%;padding:10px;">
    <option>Cash on Delivery</option>
    <option>UPI</option>
    <option>Credit Card</option>
    <option>Debit Card</option>
</select><br><br>

<button type="submit"
style="width:100%;padding:12px;background:#ff4d94;color:white;border:none;font-size:18px;">
Place Order
</button>

</form>

</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("product").value =
params.get("product") || "";

document.getElementById("price").value =
"₹" + (params.get("price") || "");
</script>

</body>
</html>
