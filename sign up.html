<!DOCTYPE html>
<html>
<head>
    <title>NovaConnect - Sign Up</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f5ff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            width:320px;
            background:white;
            padding:25px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        .app-name{
            text-align:center;
            color:#1f4db8;
            font-size:30px;
            font-weight:bold;
            margin-bottom:5px;
        }

        .tagline{
            text-align:center;
            color:gray;
            margin-bottom:20px;
        }

        h2{
            text-align:center;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:10px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#1f4db8;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#15388a;
        }

        .login{
            text-align:center;
            margin-top:15px;
        }

        a{
            text-decoration:none;
            color:#1f4db8;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="app-name">NovaConnect</div>
    <div class="tagline">Connect • Chat • Share</div>

    <h2>Create Account</h2>

    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="tel" placeholder="Mobile Number" required>
        <input type="password" placeholder="Password" required>
        <input type="password" placeholder="Confirm Password" required>

        <button type="submit">Sign Up</button>
    </form>

    <div class="login">
        Already have an account?
        <a href="#">Login</a>
    </div>

</div>

</body>
</html>
